# Content Sections
sections:
  - id: "why-chosen"
    icon: "fa-solid fa-bullseye"
    title: "Why Was the Northern Cardinal Chosen as the State Bird?"
    subsections:
      - subtitle: "Historical Background"
        text: "In the early 20th century, many states began adopting official symbols to foster civic pride and identity. Illinois was part of this movement, seeking a bird that truly represented the character and spirit of the state."

      - subtitle: "How the Decision Was Made"
        text: "In 1929, Illinois schoolchildren across the state participated in a democratic vote to select their state bird. The Northern Cardinal won by a significant margin, defeating other candidates including the bluebird, bobwhite, and meadowlark."

      - subtitle: "Reasons for Its Popularity"
        text: "Several factors contributed to the Cardinal's selection. Its brilliant red plumage made it instantly recognizable and visually striking. Unlike migratory birds that leave during winter, cardinals remain in Illinois year-round."

      - subtitle: "Symbolic Meaning for the State"
        text: "The Northern Cardinal embodies qualities that resonate with Illinois residents—vitality, resilience, and statewide recognition."

  - id: "history"
    icon: "fa-solid fa-landmark"
    title: "History of Adoption: Legislation & Timeline"
    subsections:
      - subtitle: "1928 — Early Proposals"
        text: "Conservation groups and bird enthusiasts began advocating for the selection of an official state bird."

      - subtitle: "1929 — Historic Student Vote"
        text: "Illinois schoolchildren participated in a statewide vote to choose the state bird. The Northern Cardinal received overwhelming support."

      - subtitle: "1929 — Official Legislative Action"
        text: "The Illinois General Assembly formally designated the Northern Cardinal as the official state bird."

      - subtitle: "Legacy and Continuation"
        text: "Six other states later selected the Northern Cardinal as their state bird."

  - id: "symbolism"
    icon: "fa-solid fa-heart"
    title: "Symbolism & Cultural Meaning"
    subsections:
      - subtitle: "Symbol of Hope and Vitality"
        text: "The cardinal's bright red color represents life, energy, and hope during long Illinois winters."

      - subtitle: "Representation in Local Culture"
        text: "The Northern Cardinal appears in Illinois mascots, festivals, and state branding."

      - subtitle: "Spiritual and Folklore Associations"
        text: "Cardinals are often seen as spiritual messengers in local folklore."

      - subtitle: "Why Residents Connect With This Bird"
        text: "Cardinals frequently visit feeders and suburban yards, creating a strong emotional connection."

  - id: "physical"
    icon: "fa-solid fa-magnifying-glass"
    title: "Physical Characteristics"
    subsections:
      - subtitle: "Male Cardinals"
        text: "Brilliant red plumage, a pointed crest, and a black face mask."

      - subtitle: "Female Cardinals"
        text: "Warm tan coloration with red accents and a grayish face mask."

      - subtitle: "Juvenile Cardinals"
        text: "Resemble females but with a dark bill; males turn red after their first molt."

  - id: "behavior"
    icon: "fa-solid fa-music"
    title: "Behavior & Habits"
    subsections:
      - subtitle: "Song & Calls"
        text: "Cardinals sing clear whistles like 'cheer-cheer-cheer'; females also sing."

      - subtitle: "Territorial Behavior"
        text: "Males aggressively defend territories and may attack reflections."

      - subtitle: "Feeding Habits"
        text: "They eat seeds, fruits, and insects."

      - subtitle: "Mating & Family Life"
        text: "Cardinals form monogamous pairs that often mate for life."

  - id: "habitat"
    icon: "fa-solid fa-tree"
    title: "Habitat & Conservation"
    subsections:
      - subtitle: "Preferred Habitat"
        text: "Woodland edges, gardens, and suburban neighborhoods."

      - subtitle: "Conservation Status"
        text: "Listed as Least Concern; populations are stable or increasing."

      - subtitle: "How to Help Cardinals in Illinois"
        list:
          - "Plant native shrubs and trees"
          - "Provide feeders with sunflower seeds"
          - "Maintain dense vegetation"
          - "Avoid pesticides"
          - "Keep cats indoors"

  - id: "interesting-facts"
    icon: "fa-solid fa-lightbulb"
    title: "Interesting Facts About Northern Cardinals"
    style: "gradient"
    facts:
      - "Cardinals can live up to 15 years in the wild"
      - "Red color comes from carotenoid pigments"
      - "Females also sing"
      - "A group of cardinals is called a 'college' or 'radiance'"
      - "They do not migrate"
      - "The oldest known wild cardinal lived 15 years and 9 months"

# FAQ Section
faq:
  - question: "Why is the Northern Cardinal Illinois's state bird?"
    answer: "Illinois chose the Northern Cardinal in 1929 after a statewide student vote."

  - question: "When was the Northern Cardinal adopted?"
    answer: "In 1929."

  - question: "How many states have the Northern Cardinal as their state bird?"
    answer: "Seven states: Illinois, Indiana, Kentucky, North Carolina, Ohio, Virginia, and West Virginia."

  - question: "Do Northern Cardinals migrate?"
    answer: "No. They stay in Illinois year-round."

  - question: "What do Northern Cardinals eat?"
    answer: "Seeds, fruits, berries, and insects."

  - question: "Are male and female cardinals different colors?"
    answer: "Yes. Males are bright red; females are tan with red accents."

  - question: "Do female cardinals sing?"
    answer: "Yes, females also sing."

  - question: "Where can I see Northern Cardinals in Illinois?"
    answer: "In parks, gardens, woodlands, and suburban backyards."

